name: Build and Release Debian Package

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 1.0.0. Leave empty to use the ref name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build_deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: ubuntu-22.04
            codename: jammy
            debhelper: "13"
          - ubuntu: ubuntu-24.04
            codename: noble
            debhelper: "13"

    runs-on: ${{ matrix.ubuntu }}

    env:
      PACKAGE_NAME: libhs-cpp
      RUNTIME_PACKAGE_NAME: libhs-cpp1
      DEV_PACKAGE_NAME: libhs-cpp-dev
      DISTRO_CODENAME: ${{ matrix.codename }}
      DEBHELPER_VERSION: ${{ matrix.debhelper }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            debhelper \
            devscripts \
            dpkg-dev \
            lintian \
            libhyperscan-dev \
            rsync

      - name: Set package version
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.version || '' }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "PACKAGE_VERSION could not be determined."
            exit 1
          fi

          echo "PACKAGE_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "Package version: ${VERSION}"
          echo "Distro codename: ${DISTRO_CODENAME}"

      - name: Prepare Debian source tree
        run: |
          set -euo pipefail

          VERSION="${PACKAGE_VERSION}"
          SRC_DIR="${GITHUB_WORKSPACE}/${PACKAGE_NAME}-${VERSION}"
          PACKAGE_OUTPUT_DIR="${GITHUB_WORKSPACE}/packages/${DISTRO_CODENAME}"

          rm -rf "${SRC_DIR}"
          rm -rf "${PACKAGE_OUTPUT_DIR}"

          mkdir -p "${SRC_DIR}"
          mkdir -p "${PACKAGE_OUTPUT_DIR}"

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='debian' \
            --exclude='build' \
            --exclude='packages' \
            "${GITHUB_WORKSPACE}/" "${SRC_DIR}/"

          cd "${SRC_DIR}"

          tar czf "${GITHUB_WORKSPACE}/${PACKAGE_NAME}_${VERSION}.orig.tar.gz" .

          mkdir -p debian/source

          cat > debian/source/format <<EOF
          3.0 (quilt)
          EOF

          cat > debian/changelog <<EOF
          ${PACKAGE_NAME} (${VERSION}-1.${DISTRO_CODENAME}) ${DISTRO_CODENAME}; urgency=medium

            * Build ${PACKAGE_NAME} Debian packages.
            * Package shared runtime, static library, headers, and CMake development files.

           -- Ludvik Jerabek <ludvikjerabek@users.noreply.github.com>  $(date -R)
          EOF

          cat > debian/control <<EOF
          Source: ${PACKAGE_NAME}
          Section: libs
          Priority: optional
          Maintainer: Ludvik Jerabek <ludvikjerabek@users.noreply.github.com>
          Build-Depends: debhelper-compat (= ${DEBHELPER_VERSION}),
           cmake,
           libhyperscan-dev
          Standards-Version: 4.5.1
          Rules-Requires-Root: no

          Package: ${RUNTIME_PACKAGE_NAME}
          Architecture: any
          Depends: \${shlibs:Depends}, \${misc:Depends}
          Description: C++20 RAII wrapper for libhs-compatible regex engines
           This package provides the shared runtime library for libhs-cpp.
           .
           libhs-cpp wraps libhs-compatible engines such as Intel Hyperscan
           and VectorCamp VectorScan using modern C++20 RAII abstractions.

          Package: ${DEV_PACKAGE_NAME}
          Architecture: any
          Section: libdevel
          Depends: ${RUNTIME_PACKAGE_NAME} (= \${binary:Version}), \${misc:Depends}, libhyperscan-dev
          Description: development files for libhs-cpp
           This package provides headers, CMake files, the unversioned shared
           library symlink, and the static library for building applications
           against libhs-cpp.
          EOF

          cat > debian/copyright <<EOF
          Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
          Upstream-Name: ${PACKAGE_NAME}
          Upstream-Contact: Ludvik Jerabek <ludvikjerabek@users.noreply.github.com>
          Source: https://github.com/ludvikjerabek/libhs-cpp

          Files: *
          Copyright: 2024 Ludvik Jerabek <ludvikjerabek@users.noreply.github.com>
          License: MIT
           Permission is hereby granted, free of charge, to any person obtaining a copy
           of this software and associated documentation files (the "Software"), to deal
           in the Software without restriction, including without limitation the rights
           to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
           copies of the Software, and to permit persons to whom the Software is
           furnished to do so, subject to the following conditions:
           .
           The above copyright notice and this permission notice shall be included in all
           copies or substantial portions of the Software.
           .
           THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
           IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
           FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
           AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
           LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
           OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
           SOFTWARE.

          Files: debian/*
          Copyright: 2024 Ludvik Jerabek <ludvikjerabek@users.noreply.github.com>
          License: MIT
           Same as above.
          EOF

          cat > debian/rules <<'EOF'
          #!/usr/bin/make -f

          %:
          	dh $@ --buildsystem=cmake

          override_dh_auto_configure:
          	dh_auto_configure -- \
          		-DCMAKE_BUILD_TYPE=Release \
          		-DBUILD_SHARED_LIBS=ON \
          		-DBUILD_STATIC_LIBS=ON \
          		-DCMAKE_INSTALL_PREFIX=/usr

          override_dh_install:
          	dh_install --sourcedir=debian/tmp
          EOF

          chmod +x debian/rules

          cat > "debian/${RUNTIME_PACKAGE_NAME}.install" <<EOF
          usr/lib/*/libhs-cpp.so.*
          EOF

          cat > "debian/${DEV_PACKAGE_NAME}.install" <<EOF
          usr/include/libhs-cpp/*
          usr/lib/*/libhs-cpp.so
          usr/lib/*/libhs-cpp.a
          usr/lib/*/cmake/libhs-cpp/*
          EOF

      - name: Build Debian packages
        run: |
          set -euo pipefail

          VERSION="${PACKAGE_VERSION}"
          SRC_DIR="${GITHUB_WORKSPACE}/${PACKAGE_NAME}-${VERSION}"
          PACKAGE_OUTPUT_DIR="${GITHUB_WORKSPACE}/packages/${DISTRO_CODENAME}"

          cd "${SRC_DIR}"

          dpkg-buildpackage -us -uc -b

          mkdir -p "${PACKAGE_OUTPUT_DIR}"

          cp "../${RUNTIME_PACKAGE_NAME}_"*.deb "${PACKAGE_OUTPUT_DIR}/"
          cp "../${DEV_PACKAGE_NAME}_"*.deb "${PACKAGE_OUTPUT_DIR}/"

          echo "Built packages:"
          ls -lh "${PACKAGE_OUTPUT_DIR}"

      - name: Verify Debian package contents
        run: |
          set -euo pipefail

          PACKAGE_OUTPUT_DIR="${GITHUB_WORKSPACE}/packages/${DISTRO_CODENAME}"

          echo "Runtime package contents:"
          dpkg-deb -c "${PACKAGE_OUTPUT_DIR}/${RUNTIME_PACKAGE_NAME}_"*.deb

          echo "Development package contents:"
          dpkg-deb -c "${PACKAGE_OUTPUT_DIR}/${DEV_PACKAGE_NAME}_"*.deb

          echo "Check required runtime files:"
          dpkg-deb -c "${PACKAGE_OUTPUT_DIR}/${RUNTIME_PACKAGE_NAME}_"*.deb | grep -E 'libhs-cpp\.so\.[0-9]'

          echo "Check required development files:"
          dpkg-deb -c "${PACKAGE_OUTPUT_DIR}/${DEV_PACKAGE_NAME}_"*.deb | grep -E 'libhs-cpp\.so$|libhs-cpp\.a|include/libhs-cpp|cmake/libhs-cpp'

      - name: Test package installation
        run: |
          set -euo pipefail

          PACKAGE_OUTPUT_DIR="${GITHUB_WORKSPACE}/packages/${DISTRO_CODENAME}"

          sudo apt-get update
          sudo apt-get install -y \
            "${PACKAGE_OUTPUT_DIR}/${RUNTIME_PACKAGE_NAME}_"*.deb \
            "${PACKAGE_OUTPUT_DIR}/${DEV_PACKAGE_NAME}_"*.deb

      - name: Lint Debian packages
        run: |
          set -euo pipefail

          PACKAGE_OUTPUT_DIR="${GITHUB_WORKSPACE}/packages/${DISTRO_CODENAME}"

          lintian "${PACKAGE_OUTPUT_DIR}"/*.deb

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: debian-packages-${{ matrix.codename }}-${{ env.PACKAGE_VERSION }}
          path: ${{ github.workspace }}/packages/${{ matrix.codename }}/*.deb
          retention-days: 90
          if-no-files-found: error
          compression-level: 6
          overwrite: false

      - name: Upload packages to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/packages/${{ matrix.codename }}/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}